container:
  properties:
    html: "<center style=\"font-style:italic; color:#888; margin: 3em;\">\n<!DOCTYPE html>\n<html lang=\"en\">\n  <head>\n    <meta charset=\"UTF-8\">\n    <title>Evaluation Complete</title><div anvil-slot=\"navbar_slot\"></div>\n    <style>\n      body {\n        margin: 0;\n        font-family: Arial, sans-serif;\n        background-color: #f5f5f5;\n        text-align: center;\n        <div anvil-slot=\"navbar_slot\"></div>\n      }\n      \n      /* Top Navbar */\n      .navbar {\n        background-color: #0b2a5b;\n        padding: 15px 0;\n        \n      }\n\n      .navbar a {\n        color: white;\n        text-decoration: none;\n        margin: 0 25px;\n        font-size: 18px;\n      }\n\n      .navbar a:hover {\n        text-decoration: underline;\n      }\n\n      /* Main Container */\n      .container {\n        margin-top: 80px;\n      }\n\n      /* Circle Check Icon */\n      .circle {\n        width: 120px;\n        height: 120px;\n        background-color: #0b2a5b;\n        border-radius: 50%;\n        margin: 0 auto 30px auto;\n        display: flex;\n        align-items: center;\n        justify-content: center;\n      }\n\n      .checkmark {\n        font-size: 50px;\n        color: white;\n      }\n\n      /* Text */\n      .message {\n        color: #444;\n        font-size: 16px;\n        margin-bottom: 30px;\n        line-height: 1.5;\n      }\n\n      /* Button */\n      .btn {\n        background-color: #0b2a5b;\n        color: white;\n        padding: 10px 20px;\n        border: none;\n        border-radius: 4px;\n        font-size: 14px;\n        cursor: pointer;\n      }\n\n      .btn:hover {\n        background-color: #082046;\n      }\n    </style>\n  </head>\n  <body>\n\n    <!-- Navbar -->\n    \n\n    <!-- Main Content -->\n    <div class=\"container\">\n      <div class=\"circle\">\n        <div class=\"checkmark\">✓</div>\n      </div>\n\n      <div class=\"message\">\n        Thank you for completing a peer evaluation.\n        <span anvil-slot=\"student_name_slot\"></span>.\n        <br>\n        A confirmation email has been sent.\n      </div>\n\n      <div anvil-slot=\"dashboard_button_slot\"></div>\n    </div>\n\n  </body>\n</html>\n</center>\n<div anvil-slot=\"default\"></div>"
  type: HtmlTemplate
is_package: true
