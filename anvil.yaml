allow_embedding: false
db_schema:
  users:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      client_hidden: false
      name: email
      type: string
    - admin_ui: {order: 1, width: 200}
      client_hidden: false
      name: enabled
      type: bool
    - admin_ui: {order: 2, width: 200}
      client_hidden: false
      name: last_login
      type: datetime
    - admin_ui: {order: 4, width: 200}
      client_hidden: false
      name: n_password_failures
      type: number
    - admin_ui: {order: 5, width: 200}
      client_hidden: false
      name: confirmed_email
      type: bool
    - admin_ui: {order: 6, width: 200}
      client_hidden: false
      name: role
      type: string
    - admin_ui: {order: 7, width: 200}
      client_hidden: false
      name: password_hashed
      type: string
    - admin_ui: {order: 7, width: 240}
      client_hidden: false
      name: password_hash
      type: string
    - admin_ui: {order: 8, width: 200}
      client_hidden: false
      name: signed_up
      type: datetime
    - admin_ui: {}
      client_hidden: null
      name: email_confirmation_key
      type: string
    server: full
    title: Users
name: Project
package_name: Project
runtime_options:
  client_version: '3'
  legacy_features: {bootstrap3: true, class_names: true}
  server_spec: {base: python310-minimal}
  version: 3
services:
- client_config: {}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {allow_signup: true, confirm_email: true, enable_automatically: true, use_email: true}
  server_config:
    email_content:
      confirm_address:
        html: |-
          <p>Thanks for registering your account with us. Please click the following link to confirm that this is your account:</p>
          <p>{{confirm_link}}</p>
          <p>Thanks,</p>
          <p>The team</p>
      reset_password:
        html: |-
          <p>Hi there,</p>
          <p>You have requested a password reset for your account {{email}}. To reset your password, click the link below:</p>
          <p>{{reset_link}}</p>
          <p>This link will expire in ten minutes.</p>
    user_table: users
  source: /runtime/services/anvil/users.yml
startup: {module: login, type: form}
startup_form: null
uplink_visible: true
